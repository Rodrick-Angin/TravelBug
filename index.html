<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>TravelBug - Around The World</title>
  <meta name="description" content="TravelBug - Around The World. Track your travels and view your journey." />

  <link rel="icon" href="AppIcon.png" />

  <meta property="og:title" content="TravelBug - Around The World" />
  <meta property="og:description" content="TravelBug - Around The World. Track your travels and view your journey." />
  <meta property="og:image" content="AppIcon.png" />
  <meta property="og:type" content="website" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="TravelBug - Around The World" />
  <meta name="twitter:description" content="TravelBug - Around The World. Track your travels and view your journey." />
  <meta name="twitter:image" content="AppIcon.png" />

  <meta name="apple-itunes-app" content="app-id=6760630281" />

  <style>
    :root {
      --bg: #0b1f3a;
      --card: rgba(255,255,255,0.06);
      --text: #ffffff;
      --muted: rgba(255,255,255,0.75);
      --link: rgba(255,255,255,0.92);
      --primary: #1d4ed8;
      --primaryHover: #2563eb;
      --border: rgba(255,255,255,0.12);
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 16px;
      box-sizing: border-box;
    }

    .container {
      width: 100%;
      max-width: 720px;
      text-align: center;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 22px;
      box-sizing: border-box;
    }

    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
    }

    .brand img {
      width: 110px;
      height: 110px;
      border-radius: 22px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    h1 {
      font-size: 28px;
      margin: 0;
      letter-spacing: 0.2px;
    }

    p {
      margin: 10px 0 0 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 16px;
    }

    .actions {
      margin-top: 18px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 12px;
      background: var(--primary);
      color: white;
      text-decoration: none;
      font-weight: 650;
      border: 1px solid rgba(255,255,255,0.10);
    }

    .btn:hover {
      background: var(--primaryHover);
    }

    .links {
      margin-top: 18px;
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      font-size: 14px;
    }

    .links a {
      color: var(--link);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    footer {
      margin-top: 14px;
      font-size: 12px;
      color: rgba(255,255,255,0.6);
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">
      <div class="brand">
        <img src="AppIcon.png" alt="TravelBug App Icon" />
        <h1>TravelBug - Around The World</h1>
      </div>

      <p>Track your travels and view your journey.</p>

      <div class="actions">
        <a class="btn" href="https://apps.apple.com/app/id6760630281">View on the App Store</a>
      </div>

      <div class="links" aria-label="Legal and support links">
        <a href="privacy-policy.html">Privacy Policy</a>
        <a href="terms.html">Terms</a>
        <a href="support.html">Support</a>
      </div>

      <footer>© 2026 TravelBug</footer>
    </div>
  </div>
</body>
</html>
